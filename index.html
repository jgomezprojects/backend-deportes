<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deportes — Universidad</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="container login-card stub-page landing-hero">
        <p class="stub-badge">Bienestar universitario</p>
        <h1>Actividad física y deporte</h1>
        <p class="stub-note landing-lead">
            Accede al portal para inscribirte en clases, consultar tu horario y revisar tu seguimiento académico en deporte.
        </p>
        <div class="landing-actions">
            <button type="button" id="btn-go-login" class="btn-landing btn-landing--primary">Iniciar sesión</button>
            <button type="button" id="btn-go-register" class="btn-landing btn-landing--ghost">Crear cuenta</button>
        </div>
    </div>

    <script>
        function getRole() {
            return localStorage.getItem("role_id") || localStorage.getItem("rol");
        }

        function redirectIfSessionExists() {
            const userId = localStorage.getItem("user_id");
            if (!userId) return;
            const role = getRole();
            if (role === "1") window.location.href = "estudiante.html";
            else if (role === "2") window.location.href = "profesor.html";
            else if (role === "3") window.location.href = "admin.html";
        }

        redirectIfSessionExists();

        document.getElementById("btn-go-login").addEventListener("click", () => {
            window.location.href = "login.html";
        });
        document.getElementById("btn-go-register").addEventListener("click", () => {
            window.location.href = "register.html";
        });
    </script>
</body>
</html>
