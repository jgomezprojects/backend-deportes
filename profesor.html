<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal docente — Deportes</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="css/dashboard-styles.css">
</head>
<body class="body--profesor">
    <div class="app app--wide">
        <app-header role="profesor"></app-header>

        <app-tabs tabs="clases:Mis asignaturas|alumnos:Asistencia|calificaciones:Evaluación" active-tab="clases"></app-tabs>

        <div id="prof-sport-rail-mount" class="sport-rail-mount" aria-label="Filtro por deporte"></div>

        <main class="main">
            <p class="flash" id="flash-msg" hidden></p>

            <app-section id="panel-clases" panel-id="clases" active="true" 
                  title="Mis grupos asignados" 
                  description="Clases donde apareces como docente a cargo.">
    <app-table table-id="dt-prof-clases" 
               columns="Actividad|Instalación|Nivel|Día|Horario|Cupos"
               width="100%" nowrap="true" display="display">
        <tbody slot="table-body" id="prof-tabla-clases-body"></tbody>
    </app-table>
</app-section>

            <app-section id="panel-alumnos" panel-id="alumnos" active="false" 
                  title="Control de asistencia" 
                  description="Organiza por actividad y bloque; registra presencia de tu grupo.">
    <div class="session-bar" id="prof-session-bar" aria-label="Bloque de sesiones">
        <button type="button" class="session-chip is-active" data-ses="1">Bloque 1</button>
        <button type="button" class="session-chip" data-ses="2">Bloque 2</button>
        <button type="button" class="session-chip" data-ses="3">Bloque 3</button>
    </div>
    <div id="prof-lista-alumnos" class="prof-alumnos-wrap"></div>
</app-section>

            <app-section id="panel-calificaciones" panel-id="calificaciones" active="false" 
                  title="Evaluación continua" 
                  description="Registra hasta tres bloques por estudiante; el sistema calcula el promedio enviado al expediente.">
    <div id="prof-lista-calificaciones" class="prof-calif-wrap"></div>
</app-section>
        </main>

        <app-footer role="profesor" show-api-status="true"></app-footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="js/datatables-init.js"></script>
    <script src="js/panel-utils.js"></script>
    <script src="js/sport-filter.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/web-components/app-header.js"></script>
    <script src="js/web-components/app-footer.js"></script>
    <script src="js/web-components/app-tabs.js"></script>
    <script src="js/web-components/app-section.js"></script>
    <script src="js/web-components/app-table.js"></script>
    <script src="js/web-components/app-card.js"></script>
    <script src="js/web-components/metric-card.js"></script>
    <script src="js/web-components/form-field.js"></script>
    <script src="js/web-components/progress-bar.js"></script>
    <script src="js/web-components/status-badge.js"></script>
    <script src="js/web-components/compatibility.js"></script>
    <script src="js/profesor.js"></script>
</body>
</html>
