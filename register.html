<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Deportes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container login-card">
        <h1>Deportes universidad</h1>
        <h2>Crear cuenta</h2>

        <label class="field-label" for="nombre">Usuario</label>
        <input id="nombre" type="text" placeholder="Tu nombre de usuario" autocomplete="username">

        <label class="field-label" for="email">Correo</label>
        <input id="email" type="text" placeholder="correo@ejemplo.com" autocomplete="email">

        <label class="field-label" for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Contraseña" autocomplete="new-password">

        <fieldset class="role-fieldset">
            <legend>Rol</legend>
            <label class="role-option">
                <input type="radio" name="role" value="1" checked>
                Estudiante
            </label>
            <label class="role-option">
                <input type="radio" name="role" value="2">
                Profesor
            </label>
            <label class="role-option">
                <input type="radio" name="role" value="3">
                Administrador
            </label>
        </fieldset>

        <div id="career-wrap">
            <label class="field-label" for="career">Carrera</label>
            <input id="career" type="text" placeholder="Ej: Ingeniería de Sistemas">
        </div>

        <button type="button" id="btn-register">Registrarme</button>
        <p id="register-status" class="form-status" hidden></p>
        <p class="stub-note">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </p>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
