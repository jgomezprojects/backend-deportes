<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal estudiante — Deportes</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="css/dashboard-styles.css">
</head>
<body class="body--estudiante">
    <div class="app app--wide">
        <app-header role="estudiante"></app-header>

        <app-tabs tabs="clases:Explorar clases|reservas:Mis clases|horarios:Mi horario|notas:Rendimiento" active-tab="clases"></app-tabs>

        <div id="est-sport-rail-mount" class="sport-rail-mount" aria-label="Filtro por deporte"></div>

        <main class="main">
            <p class="flash" id="flash-msg" hidden></p>

            <app-section id="panel-clases" panel-id="clases" active="true" 
                  title="Catálogo de clases" 
                  description="Elige una actividad e inscríbete cuando haya cupos disponibles.">
    <div id="lista-clases" class="card-grid card-grid--classes"></div>
</app-section>

            <app-section id="panel-reservas" panel-id="reservas" active="false" 
                  title="Mis clases inscritas" 
                  description="Actividades en las que estás matriculado actualmente.">
    <div id="lista-reservas" class="list-block list-block--enroll"></div>
</app-section>

            <app-section id="panel-horarios" panel-id="horarios" active="false" 
                  title="Mi horario semanal" 
                  description="Solo las sesiones en las que participas.">
    <div id="week-schedule" class="week-schedule"></div>
</app-section>

            <app-section id="panel-notas" panel-id="notas" active="false" 
                  title="Rendimiento académico" 
                  description="Consulta tus calificaciones por periodo y bloque de sesiones (vista orientativa).">
    
    <app-card variant="default" padding="normal" title="Filtros de Consulta">
        <div class="filter-bar">
            <form-field label="Periodo" type="select" name="periodo" options="Todos los periodos|2026-1|2026-2" value="2026-1"></form-field>
            <form-field label="Bloque de sesiones" type="select" name="sesion" options="Todas|Bloque 1|Bloque 2|Bloque 3"></form-field>
        </div>
    </app-card>
    
    <p id="notas-promedio-global" class="calif-promedio-hint" hidden></p>
    
    <app-table table-id="dt-notas-estudiante" 
               columns="Actividad|Bloque|Nota|Profesor|Fecha"
               width="100%" nowrap="true" display="display">
        <tbody slot="table-body"></tbody>
    </app-table>
    
    <app-card variant="default" padding="normal" title="Resumen de Rendimiento">
        <div class="metrics-grid">
            <metric-card value="8.5" label="Promedio General" change="+0.3" change-type="positive" icon="📊" variant="success"></metric-card>
            <metric-card value="12" label="Total de Actividades" change="+2" change-type="positive" icon="📚" variant="default"></metric-card>
            <metric-card value="95%" label="Asistencia" change="+2%" change-type="positive" icon="✅" variant="success"></metric-card>
        </div>
    </app-card>
    
</app-section>

        </main>

        <app-footer text="Portal institucional de deportes" show-api-status="true"></app-footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="js/datatables-init.js"></script>
    <script src="js/panel-utils.js"></script>
    <script src="js/sport-filter.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/web-components/app-header.js"></script>
    <script src="js/web-components/app-footer.js"></script>
    <script src="js/web-components/app-tabs.js"></script>
    <script src="js/web-components/app-section.js"></script>
    <script src="js/web-components/app-table.js"></script>
    <script src="js/web-components/app-card.js"></script>
    <script src="js/web-components/metric-card.js"></script>
    <script src="js/web-components/form-field.js"></script>
    <script src="js/web-components/progress-bar.js"></script>
    <script src="js/web-components/status-badge.js"></script>
    <script src="js/web-components/compatibility.js"></script>
    <script src="js/estudiante.js"></script>
</body>
</html>
